<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Dawit Ateka</title>
    <link rel="stylesheet" href="/portfolio_davit/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .error-container {
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            line-height: 1;
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin: 20px 0 40px;
        }
    </style>
</head>

<body>
    <div class="error-container glass">
        <h1 class="error-code">404</h1>
        <p class="error-message">Oops! The page you are looking for seems to have drifted into the void.</p>
        <a href="/portfolio_davit/index.html" class="btn btn-primary pill">Return Home</a>
    </div>
</body>

</html>
